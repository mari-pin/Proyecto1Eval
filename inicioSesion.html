<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sweet Shop</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lobster&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="inicioSesion.css">
</head>


<body class="d-flex justify-content-center align-items-center vh-100">
   

<!-- Formulario de Inicio de Sesión -->
<div class="login-container text-center p-4 border rounded shadow vh-100">
    <h2 class="mb-4">Iniciar Sesión</h2>
    
    <!-- Formulario de Autenticación -->
    <form action="#" method="POST">
        <div class="mb-3">
            <label for="email" class="form-label fs-3">Correo Electrónico</label>
            <input type="email" class="form-control fs-3" id="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label fs-3">Contraseña</label>
            <input type="password" class="form-control fs-3" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-detalle  mt-3 fs-2">Iniciar Sesión</button>
    </form>

    <!-- Opción para iniciar sesión con Google -->
    <div class="my-3">
        <p class="text-muted">Inicia sesión con</p>
        <button class="btn btn-outline-dark w-100 fs-2"><i class="fab fa-google me-2"></i>Continuar con Google</button>
    </div>
    
    <!-- Enlace para registrarse -->
    <p class="mt-3">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
</div>
   <!-- Footer -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
