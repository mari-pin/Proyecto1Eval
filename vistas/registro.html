<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lobster&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Permanent+Marker&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <!-- Bootstrap CSS -->
      <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="/estilos/inicioSesion.css" />

    <title>Document</title>
</head>
<body class="d-flex vh-100 vh-100">
    <!-- Formulario de Inicio de Sesión -->
<div class="login-container text-center p-4 border rounded shadow">
    <h2 class="mb-4">Formulario de Registro</h2>
    
    <!-- Formulario de Autenticación -->
    <form action="#" method="POST">
        <div class="mb-3 input">
            <label for="nombre" class="form-label fs-5">Nombre y apellidos</label>
            <input type="text" class="form-control fs-5" id="nombre_completo" placeholder="nombre_completo" required>
        </div>
        <div class="mb-3 input">
            <label for="direccion" class="form-label fs-5">Dirección</label>
            <input type="text" class="form-control fs-5" id="direccion" placeholder="dirección" required>
        </div>
        <div class="mb-3 input">
            <label for="direccion" class="form-label fs-5">Ciudad</label>
            <input type="text" class="form-control fs-5" id="ciudad" placeholder="ciudad" required>
        </div>
        <div class="mb-3 input">
            <label for="direccion" class="form-label fs-5">Codigo Postal</label>
            <input type="text" class="form-control fs-5" id="codigo postal" placeholder="codigo postal" required>
        </div>
        <div class="mb-3 input">
            <label for="email" class="form-label fs-5">Correo Electrónico</label>
            <input type="email" class="form-control fs-5" id="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="mb-3 input">
            <label for="password" class="form-label fs-5">Contraseña</label>
            <input type="password" class="form-control fs-5" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-detalle fs-2"><a href="register.html">Aceptar</a></button>
    </form>

    
    
   
</div>


     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
