<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <!-- Bootstrap CSS -->
      <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="style2.css" />

    <title>Document</title>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 body-sesion">
    <!-- Formulario de Inicio de Sesión -->
<div class="login-container text-center p-4 border rounded shadow">
    <h2 class="mb-4">Iniciar Sesión</h2>
    
    <!-- Formulario de Autenticación -->
    <form action="#" method="POST">
        <div class="mb-3 input">
            <label for="nombre" class="form-label fs-5">Nombre y apellidos</label>
            <input type="text" class="form-control fs-5" id="nombre_completo" placeholder="nombre_completo" required>
        </div>
        <div class="mb-3 input">
            <label for="direccion" class="form-label fs-5">Dirección</label>
            <input type="text" class="form-control fs-5" id="direccion" placeholder="nombre_completo" required>
        </div>

        <div class="mb-3 input">
            <label for="email" class="form-label fs-5">Correo Electrónico</label>
            <input type="email" class="form-control fs-5" id="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="mb-3 input">
            <label for="password" class="form-label fs-5">Contraseña</label>
            <input type="password" class="form-control fs-5" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn w-80 mt-3 fs-4 btn-detalle"><a href="register.html" class="btn-registro">Aceptar</a></button>
    </form>

    
    
   
</div>


     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
